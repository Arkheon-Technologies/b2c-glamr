name: CI
on:
  pull_request:
    branches: [main, staging]
  push:
    branches: ['**']

jobs:
  quality:
    name: Lint, Type-check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - run: npm ci

      - name: Generate Prisma Client
        run: npm run db:generate

      - name: Lint (web)
        run: npm run lint --workspace=@glamr/web

      - name: Type-check (shared-types)
        run: npm run lint --workspace=@glamr/shared-types

      - name: Type-check (db)
        run: npm run lint --workspace=@glamr/db

      - name: Type-check (api)
        run: npm run type-check:api

      - name: Test
        run: npm run test

      - name: Notify Discord
        if: ${{ always() && hashFiles('scripts/notify-discord.sh') != '' }}
        run: ./scripts/notify-discord.sh ci n/a "${{ job.status }}" ""
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - run: npm ci

      - name: Generate Prisma Client
        run: npm run db:generate

      - name: Build
        run: npm run build

      - name: Notify Discord
        if: ${{ always() && hashFiles('scripts/notify-discord.sh') != '' }}
        run: ./scripts/notify-discord.sh build n/a "${{ job.status }}" ""
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
