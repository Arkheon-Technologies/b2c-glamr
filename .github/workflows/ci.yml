name: CI
on:
  pull_request:
    branches: [main, staging]
  push:
    branches: ['**']

jobs:
  quality:
    name: Lint, Type-check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - run: npm ci

      - name: Generate Prisma Client
        run: npm run db:generate

      - name: Lint (web)
        run: npm run lint --workspace=@glamr/web

      - name: Type-check (shared-types)
        run: npm run lint --workspace=@glamr/shared-types

      - name: Type-check (db)
        run: npm run lint --workspace=@glamr/db

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - run: npm ci

      - name: Generate Prisma Client
        run: npm run db:generate

      - name: Build
        run: npm run build
